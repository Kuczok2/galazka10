<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Mój Planner</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #74ebd5, #9face6);
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }

    .kontener {
      width: 100%;
      max-width: 400px;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-top: 0;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
      box-sizing: border-box;
    }

    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #45a049;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #fdfdfd;
      margin-bottom: 8px;
      padding: 12px;
      cursor: pointer;
      border-radius: 8px;
      border-left: 5px solid #4CAF50;
      transition: transform 0.1s;
    }

    li:hover {
      background-color: #f0f0f0;
      transform: translateX(5px);
    }

    .ukonczone {
      text-decoration: line-through;
      color: #888;
      border-left-color: #ccc;
    }
  </style>
</head>
<body>

<div class="kontener">
  <h1>Moje Zadania</h1>

  <input id="wejscieZadania" placeholder="Co masz do zrobienia?">
  <button id="dodajBtn">Dodaj do listy</button>

  <select id="filtr">
    <option value="wszystkie">Wszystkie</option>
    <option value="aktywne">W trakcie</option>
    <option value="zrobione">Zrobione</option>
  </select>

  <ul id="lista"></ul>
</div>

<script>
  let zadania = [];

  const wejscieZadania = document.getElementById("wejscieZadania");
  const dodajBtn = document.getElementById("dodajBtn");
  const filtr = document.getElementById("filtr");
  const listaWidok = document.getElementById("lista");

  function odswiezListe() {
    listaWidok.innerHTML = "";
    const stanFiltra = filtr.value;

    zadania.forEach((zadanie, indeks) => {
      if (stanFiltra === "aktywne" && zadanie.gotowe) return;
      if (stanFiltra === "zrobione" && !zadanie.gotowe) return;

      const li = document.createElement("li");
      li.textContent = zadanie.tresc;
      
      if (zadanie.gotowe) {
        li.className = "ukonczone";
      }
      li.onclick = () => {
        zadanie.gotowe = !zadanie.gotowe;
        odswiezListe();
      };

      listaWidok.appendChild(li);
    });
  }

  dodajBtn.onclick = () => {
    const tekst = wejscieZadania.value.trim();

    if (tekst === "") {
      alert("Najpierw coś wpisz!");
      return;
    }

    zadania.push({
      tresc: tekst,
      gotowe: false
    });

    wejscieZadania.value = "";
    odswiezListe();
  };

  filtr.onchange = odswiezListe;
</script>

</body>
</html>
